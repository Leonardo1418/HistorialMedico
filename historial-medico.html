<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial Médico</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #fffef9;
    --border: #d4c9b0;
    --accent: #2d5016;
    --accent-light: #4a7c2a;
    --accent-pale: #e8f0e0;
    --danger: #8b2020;
    --text: #1a1a14;
    --muted: #6b6450;
    --tag: #c8ddb8;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: var(--accent);
    color: #fff;
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid #1a3009;
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    letter-spacing: -0.5px;
  }
  .header-title span { font-style: italic; color: #a8d080; }
  .header-sub { font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  .btn-export {
    background: #a8d080;
    color: var(--accent);
    border: none;
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .btn-export:hover { background: #c4e89a; transform: translateY(-1px); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 0 40px;
  }
  .tab {
    padding: 14px 24px;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text); }

  /* LAYOUT */
  .content { padding: 32px 40px; max-width: 1100px; margin: 0 auto; }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
    margin-bottom: 28px;
  }
  .form-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    color: var(--accent);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .form-grid .full { grid-column: 1 / -1; }

  .field label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent-light);
    background: #fff;
  }
  .field textarea { resize: vertical; min-height: 80px; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); }

  .success-msg {
    background: var(--accent-pale);
    border: 1px solid var(--tag);
    color: var(--accent);
    padding: 10px 16px;
    font-size: 0.8rem;
    border-radius: 2px;
    margin-top: 12px;
    display: none;
  }

  /* SEARCH PANEL */
  .search-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .search-bar input, .search-bar select {
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    outline: none;
    flex: 1;
    min-width: 150px;
    transition: border-color 0.2s;
  }
  .search-bar input:focus, .search-bar select:focus { border-color: var(--accent-light); }
  .btn-clear {
    padding: 10px 16px;
    background: none;
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

  /* STATS */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 0.72rem;
    border-radius: 2px;
    letter-spacing: 0.5px;
  }
  .stat-pill strong { color: var(--accent); font-weight: 500; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  thead { background: var(--accent); color: #fff; }
  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 400;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { background: var(--accent-light); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--accent-pale); }
  td { padding: 12px 16px; vertical-align: top; }
  td.patient { font-weight: 500; color: var(--accent); }
  td.date { color: var(--muted); white-space: nowrap; }
  .tag {
    display: inline-block;
    background: var(--tag);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 0.7rem;
    letter-spacing: 0.5px;
  }
  .notes-cell { max-width: 260px; }
  .notes-cell p { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .btn-del {
    background: none;
    border: 1px solid #d4b0b0;
    color: var(--danger);
    padding: 4px 10px;
    font-size: 0.65rem;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .btn-del:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state p { font-size: 0.85rem; }

  /* Detail modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px;
    max-width: 560px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
  }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--accent); margin-bottom: 20px; }
  .modal-row { display: flex; gap: 8px; margin-bottom: 12px; font-size: 0.82rem; }
  .modal-row .lbl { color: var(--muted); min-width: 140px; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; padding-top: 2px; }
  .modal-row .val { color: var(--text); flex: 1; }
  .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); }
  .modal-close:hover { color: var(--danger); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .hidden { display: none; }

  @media (max-width: 640px) {
    .header { padding: 16px 20px; }
    .tabs { padding: 0 20px; }
    .content { padding: 20px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Historial <span>Médico</span></div>
    <div class="header-sub">Sistema de registro clínico</div>
  </div>
  <button class="btn-export" onclick="exportCSV()">⬇ Exportar CSV</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('registro', this)">+ Nueva Consulta</button>
  <button class="tab" onclick="showTab('historial', this)">Historial</button>
</div>

<!-- REGISTRO -->
<div id="tab-registro" class="content">
  <div class="form-card">
    <h2>Registrar Consulta</h2>
    <div class="form-grid">
      <div class="field">
        <label>Nombre del Paciente *</label>
        <input type="text" id="f-paciente" placeholder="Ej: María García">
      </div>
      <div class="field">
        <label>Fecha de Consulta *</label>
        <input type="date" id="f-fecha">
      </div>
      <div class="field">
        <label>Edad</label>
        <input type="number" id="f-edad" placeholder="Años" min="0" max="120">
      </div>
      <div class="field">
        <label>Género</label>
        <select id="f-genero">
          <option value="">— Seleccionar —</option>
          <option>Femenino</option>
          <option>Masculino</option>
          <option>Otro</option>
          <option>Prefiere no decir</option>
        </select>
      </div>
      <div class="field">
        <label>Tipo de Consulta</label>
        <select id="f-tipo">
          <option value="">— Seleccionar —</option>
          <option>Control rutinario</option>
          <option>Urgencia</option>
          <option>Seguimiento</option>
          <option>Primera consulta</option>
          <option>Especialidad</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="field">
        <label>Médico / Especialista</label>
        <input type="text" id="f-medico" placeholder="Nombre del médico">
      </div>
      <div class="field full">
        <label>Motivo de Consulta *</label>
        <input type="text" id="f-motivo" placeholder="Ej: Dolor de cabeza, fiebre...">
      </div>
      <div class="field full">
        <label>Diagnóstico</label>
        <input type="text" id="f-diagnostico" placeholder="Diagnóstico o impresión clínica">
      </div>
      <div class="field full">
        <label>Tratamiento / Medicamentos</label>
        <textarea id="f-tratamiento" placeholder="Medicamentos recetados, dosis, indicaciones..."></textarea>
      </div>
      <div class="field full">
        <label>Notas adicionales</label>
        <textarea id="f-notas" placeholder="Observaciones, alergias, antecedentes relevantes..."></textarea>
      </div>
    </div>
    <button class="btn-primary" onclick="guardarRegistro()">Guardar Consulta</button>
    <div class="success-msg" id="success-msg">✓ Consulta registrada correctamente.</div>
  </div>
</div>

<!-- HISTORIAL -->
<div id="tab-historial" class="content hidden">
  <div class="search-bar">
    <input type="text" id="s-paciente" placeholder="Buscar paciente..." oninput="filtrar()">
    <input type="date" id="s-desde" oninput="filtrar()" title="Desde fecha">
    <input type="date" id="s-hasta" oninput="filtrar()" title="Hasta fecha">
    <select id="s-tipo" onchange="filtrar()">
      <option value="">Todos los tipos</option>
      <option>Control rutinario</option>
      <option>Urgencia</option>
      <option>Seguimiento</option>
      <option>Primera consulta</option>
      <option>Especialidad</option>
      <option>Otro</option>
    </select>
    <button class="btn-clear" onclick="limpiarFiltros()">✕ Limpiar</button>
  </div>

  <div class="stats-row" id="stats-row"></div>

  <div class="table-wrap">
    <table id="tabla">
      <thead>
        <tr>
          <th onclick="sortBy('fecha')">Fecha ↕</th>
          <th onclick="sortBy('paciente')">Paciente ↕</th>
          <th>Tipo</th>
          <th>Motivo</th>
          <th>Diagnóstico</th>
          <th>Médico</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state hidden" id="empty-state">
      <div class="icon">🗒️</div>
      <p>No hay registros que coincidan con los filtros.</p>
    </div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="cerrarModalBtn()">✕</button>
    <h2 id="m-titulo">Detalle de Consulta</h2>
    <hr class="divider">
    <div id="m-body"></div>
  </div>
</div>

<script>
  // --- DATA ---
  let registros = JSON.parse(localStorage.getItem('historial_medico') || '[]');
  let sortCol = 'fecha';
  let sortAsc = false;

  // Set today's date as default
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];

  function save() {
    localStorage.setItem('historial_medico', JSON.stringify(registros));
  }

  // --- TABS ---
  function showTab(tab, el) {
    document.getElementById('tab-registro').classList.add('hidden');
    document.getElementById('tab-historial').classList.add('hidden');
    document.getElementById('tab-' + tab).classList.remove('hidden');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (tab === 'historial') renderTabla();
  }

  // --- GUARDAR ---
  function guardarRegistro() {
    const paciente = document.getElementById('f-paciente').value.trim();
    const fecha = document.getElementById('f-fecha').value;
    const motivo = document.getElementById('f-motivo').value.trim();

    if (!paciente || !fecha || !motivo) {
      alert('Por favor completa los campos obligatorios: Paciente, Fecha y Motivo.');
      return;
    }

    const registro = {
      id: Date.now(),
      paciente,
      fecha,
      edad: document.getElementById('f-edad').value,
      genero: document.getElementById('f-genero').value,
      tipo: document.getElementById('f-tipo').value,
      medico: document.getElementById('f-medico').value.trim(),
      motivo,
      diagnostico: document.getElementById('f-diagnostico').value.trim(),
      tratamiento: document.getElementById('f-tratamiento').value.trim(),
      notas: document.getElementById('f-notas').value.trim(),
    };

    registros.push(registro);
    save();

    // Reset form
    ['f-paciente','f-edad','f-medico','f-motivo','f-diagnostico','f-tratamiento','f-notas'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-genero').value = '';
    document.getElementById('f-tipo').value = '';
    document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];

    const msg = document.getElementById('success-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
  }

  // --- RENDER TABLA ---
  function renderTabla() {
    const q = document.getElementById('s-paciente').value.toLowerCase();
    const desde = document.getElementById('s-desde').value;
    const hasta = document.getElementById('s-hasta').value;
    const tipo = document.getElementById('s-tipo').value;

    let filtered = registros.filter(r => {
      if (q && !r.paciente.toLowerCase().includes(q) &&
          !r.motivo.toLowerCase().includes(q) &&
          !r.diagnostico.toLowerCase().includes(q)) return false;
      if (desde && r.fecha < desde) return false;
      if (hasta && r.fecha > hasta) return false;
      if (tipo && r.tipo !== tipo) return false;
      return true;
    });

    // Sort
    filtered.sort((a, b) => {
      let va = a[sortCol] || '';
      let vb = b[sortCol] || '';
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });

    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty-state');

    // Stats
    const pacientesUnicos = [...new Set(filtered.map(r => r.paciente))].length;
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-pill">Total: <strong>${filtered.length}</strong> consultas</div>
      <div class="stat-pill">Pacientes: <strong>${pacientesUnicos}</strong></div>
      <div class="stat-pill">Total guardados: <strong>${registros.length}</strong></div>
    `;

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.classList.remove('hidden');
      document.getElementById('tabla').style.display = 'none';
      return;
    }

    empty.classList.add('hidden');
    document.getElementById('tabla').style.display = '';

    tbody.innerHTML = filtered.map(r => `
      <tr>
        <td class="date">${formatFecha(r.fecha)}</td>
        <td class="patient">${esc(r.paciente)}</td>
        <td>${r.tipo ? `<span class="tag">${esc(r.tipo)}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
        <td>${esc(r.motivo)}</td>
        <td>${r.diagnostico ? esc(r.diagnostico) : '<span style="color:var(--muted)">—</span>'}</td>
        <td>${r.medico ? esc(r.medico) : '<span style="color:var(--muted)">—</span>'}</td>
        <td style="display:flex;gap:6px;align-items:center">
          <button class="btn-primary" style="padding:5px 12px;font-size:0.65rem;margin-top:0" onclick="verDetalle(${r.id})">Ver</button>
          <button class="btn-del" onclick="eliminar(${r.id})">✕</button>
        </td>
      </tr>
    `).join('');
  }

  function filtrar() { renderTabla(); }
  function limpiarFiltros() {
    ['s-paciente','s-desde','s-hasta'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('s-tipo').value = '';
    renderTabla();
  }

  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    renderTabla();
  }

  // --- DETALLE ---
  function verDetalle(id) {
    const r = registros.find(x => x.id === id);
    if (!r) return;
    document.getElementById('m-titulo').textContent = r.paciente;
    document.getElementById('m-body').innerHTML = `
      <div class="modal-row"><span class="lbl">Fecha</span><span class="val">${formatFecha(r.fecha)}</span></div>
      ${r.edad ? `<div class="modal-row"><span class="lbl">Edad</span><span class="val">${r.edad} años</span></div>` : ''}
      ${r.genero ? `<div class="modal-row"><span class="lbl">Género</span><span class="val">${r.genero}</span></div>` : ''}
      ${r.tipo ? `<div class="modal-row"><span class="lbl">Tipo</span><span class="val"><span class="tag">${r.tipo}</span></span></div>` : ''}
      ${r.medico ? `<div class="modal-row"><span class="lbl">Médico</span><span class="val">${r.medico}</span></div>` : ''}
      <hr class="divider">
      <div class="modal-row"><span class="lbl">Motivo</span><span class="val">${esc(r.motivo)}</span></div>
      ${r.diagnostico ? `<div class="modal-row"><span class="lbl">Diagnóstico</span><span class="val">${esc(r.diagnostico)}</span></div>` : ''}
      ${r.tratamiento ? `<div class="modal-row"><span class="lbl">Tratamiento</span><span class="val" style="white-space:pre-wrap">${esc(r.tratamiento)}</span></div>` : ''}
      ${r.notas ? `<hr class="divider"><div class="modal-row"><span class="lbl">Notas</span><span class="val" style="white-space:pre-wrap;color:var(--muted)">${esc(r.notas)}</span></div>` : ''}
    `;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function cerrarModal(e) {
    if (e.target === document.getElementById('modal-overlay'))
      document.getElementById('modal-overlay').classList.remove('open');
  }
  function cerrarModalBtn() { document.getElementById('modal-overlay').classList.remove('open'); }

  // --- ELIMINAR ---
  function eliminar(id) {
    if (!confirm('¿Eliminar este registro?')) return;
    registros = registros.filter(r => r.id !== id);
    save();
    renderTabla();
  }

  // --- EXPORT CSV ---
  function exportCSV() {
    if (registros.length === 0) { alert('No hay registros para exportar.'); return; }
    const cols = ['id','fecha','paciente','edad','genero','tipo','medico','motivo','diagnostico','tratamiento','notas'];
    const header = cols.join(',');
    const rows = registros.map(r =>
      cols.map(c => `"${(r[c] || '').toString().replace(/"/g, '""')}"`).join(',')
    );
    const csv = [header, ...rows].join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `historial_medico_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  }

  // --- UTILS ---
  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function formatFecha(f) {
    if (!f) return '—';
    const [y,m,d] = f.split('-');
    return `${d}/${m}/${y}`;
  }
</script>
